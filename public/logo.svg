<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="100%" height="100%">
  <!-- TAHIR ACAR PORTFOLIO LOGO -->
  <g transform="translate(10, 10)">
    <!-- 'A' Letter (Black) drawn first to tuck under the 'T' -->
    <path 
      d="M 160 45 
         L 200 45 
         L 300 200 
         L 255 200 
         L 232 165 
         L 128 165 
         L 105 200 
         L 60 200 Z 
         M 180 85 
         L 150 130 
         L 210 130 Z" 
      fill="#1A1A1A" 
      fill-rule="evenodd" 
    />
    
    <!-- 'T' Letter (Coral) overlays the 'A' creating architectural geometry -->
    <path 
      d="M 20 0 
         L 200 0 
         L 200 45 
         L 110 45 
         L 110 200 
         L 65 200 
         L 65 45 
         L 20 45 Z" 
      fill="#F26B52" 
    />
  </g>
</svg>
